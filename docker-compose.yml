version: '3.9'

services:

  backend:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: incident-ai-backend

    ports:
      - "8000:8000"

    env_file:
      - .env

    volumes:
      - .:/app

    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile

    container_name: incident-ai-frontend

    ports:
      - "5173:5173"

    depends_on:
      - backend

    volumes:
      - ./frontend:/app
      - /app/node_modules

    restart: always